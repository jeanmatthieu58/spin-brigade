[profile.default]
src = "src"
out = "out"
libs = ["lib"]
eth_rpc_url = "https://testnet-rpc.monad.xyz"
chain_id = 10143

optimizer = true
optimizer_runs = 200
via_ir = true

verbosity = 2
gas_reports = ["*"]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
monad-testnet = "https://testnet-rpc.monad.xyz"
local = "http://localhost:8545"

[etherscan]
monad-testnet = { key = "your_api_key", url = "https://testnet-explorer.monad.xyz/api" }
